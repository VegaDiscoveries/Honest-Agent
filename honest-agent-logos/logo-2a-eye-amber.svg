<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0E00"/>
      <stop offset="100%" style="stop-color:#0D0800"/>
    </linearGradient>
    <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF8F00"/>
      <stop offset="55%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#BF360C;stop-opacity:0.6"/>
    </radialGradient>
    <radialGradient id="pupilGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD740"/>
      <stop offset="100%" style="stop-color:#FF6D00"/>
    </radialGradient>
    <filter id="amberGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Warm circuit traces -->
  <line x1="12" y1="38" x2="32" y2="38" stroke="#FF8F00" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="32" y1="38" x2="32" y2="24" stroke="#FF8F00" stroke-width="1.5" stroke-opacity="0.35"/>
  <circle cx="12" cy="38" r="2.5" fill="#FF8F00" opacity="0.4"/>
  <circle cx="32" cy="24" r="2.5" fill="#FF8F00" opacity="0.4"/>

  <line x1="116" y1="38" x2="96" y2="38" stroke="#FF8F00" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="96" y1="38" x2="96" y2="24" stroke="#FF8F00" stroke-width="1.5" stroke-opacity="0.35"/>
  <circle cx="116" cy="38" r="2.5" fill="#FF8F00" opacity="0.4"/>
  <circle cx="96" cy="24" r="2.5" fill="#FF8F00" opacity="0.4"/>

  <line x1="12" y1="90" x2="32" y2="90" stroke="#FF8F00" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="32" y1="90" x2="32" y2="104" stroke="#FF8F00" stroke-width="1.5" stroke-opacity="0.35"/>
  <circle cx="12" cy="90" r="2.5" fill="#FF8F00" opacity="0.4"/>
  <circle cx="32" cy="104" r="2.5" fill="#FF8F00" opacity="0.4"/>

  <line x1="116" y1="90" x2="96" y2="90" stroke="#FF8F00" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="96" y1="90" x2="96" y2="104" stroke="#FF8F00" stroke-width="1.5" stroke-opacity="0.35"/>
  <circle cx="116" cy="90" r="2.5" fill="#FF8F00" opacity="0.4"/>
  <circle cx="96" cy="104" r="2.5" fill="#FF8F00" opacity="0.4"/>

  <!-- Ambient glow behind eye -->
  <ellipse cx="64" cy="64" rx="40" ry="28" fill="#FF8F00" opacity="0.08" filter="url(#amberGlow)"/>

  <!-- Eye almond outline -->
  <path d="M16 64 Q64 14 112 64 Q64 114 16 64 Z"
        fill="none" stroke="#FF8F00" stroke-width="2" stroke-opacity="0.7"/>

  <!-- Iris circle -->
  <circle cx="64" cy="64" r="26" fill="url(#irisGrad)" filter="url(#amberGlow)"/>

  <!-- Hexagonal iris facets (6 triangular segments) -->
  <line x1="64" y1="38" x2="64" y2="90" stroke="#1A0E00" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="41.4" y1="51" x2="86.6" y2="77" stroke="#1A0E00" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="41.4" y1="77" x2="86.6" y2="51" stroke="#1A0E00" stroke-width="1.2" stroke-opacity="0.5"/>

  <!-- Iris ring -->
  <circle cx="64" cy="64" r="26" fill="none" stroke="#FFD740" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Pupil -->
  <circle cx="64" cy="64" r="12" fill="#0D0800"/>
  <circle cx="64" cy="64" r="12" fill="none" stroke="#FFD740" stroke-width="1"/>

  <!-- Pupil glow dot -->
  <circle cx="64" cy="64" r="5" fill="url(#pupilGrad)" filter="url(#amberGlow)"/>

  <!-- Shine -->
  <circle cx="69" cy="58" r="4" fill="white" opacity="0.55"/>
  <circle cx="60" cy="72" r="1.5" fill="white" opacity="0.25"/>
</svg>
