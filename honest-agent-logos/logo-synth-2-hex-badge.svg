<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Synthesis 2: Hexagonal Badge Robot — AI Agent + Trust -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#16213E"/>
    </linearGradient>
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B400"/>
      <stop offset="100%" style="stop-color:#C77800"/>
    </linearGradient>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="faceGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Outer hexagon badge -->
  <polygon points="64,8 106,32 106,80 64,104 22,80 22,32"
           fill="url(#hexFill)" fill-opacity="0.15"
           stroke="url(#hexFill)" stroke-width="3" filter="url(#goldGlow)"/>

  <!-- Inner hexagon (badge depth) -->
  <polygon points="64,14 100,35 100,77 64,98 28,77 28,35"
           fill="none" stroke="#E8B400" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Robot head (circle) inside hex -->
  <circle cx="64" cy="50" r="22" fill="#1A1A2E" stroke="#E8B400" stroke-width="2"/>

  <!-- Halo above robot head -->
  <ellipse cx="64" cy="26" rx="13" ry="4"
           fill="none" stroke="#E8B400" stroke-width="2.5" filter="url(#goldGlow)"/>

  <!-- Robot left eye -->
  <rect x="48" y="42" width="12" height="9" rx="3" fill="#E8B400" fill-opacity="0.15" stroke="#E8B400" stroke-width="1.5" filter="url(#faceGlow)"/>
  <circle cx="54" cy="46.5" r="2.5" fill="#E8B400" opacity="0.9"/>

  <!-- Robot right eye -->
  <rect x="68" y="42" width="12" height="9" rx="3" fill="#E8B400" fill-opacity="0.15" stroke="#E8B400" stroke-width="1.5" filter="url(#faceGlow)"/>
  <circle cx="74" cy="46.5" r="2.5" fill="#E8B400" opacity="0.9"/>

  <!-- Robot smile -->
  <path d="M52 56 Q64 64 76 56" fill="none" stroke="#E8B400" stroke-width="2" stroke-linecap="round" filter="url(#faceGlow)"/>

  <!-- Antenna -->
  <line x1="64" y1="28" x2="64" y2="36" stroke="#E8B400" stroke-width="2" stroke-linecap="round"/>

  <!-- Robot body / badge lower section -->
  <rect x="50" y="74" width="28" height="18" rx="5"
        fill="#1A1A2E" stroke="#E8B400" stroke-width="1.8"/>

  <!-- Chest check badge -->
  <polyline points="55,83 61,89 73,79"
            fill="none" stroke="#E8B400" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" filter="url(#faceGlow)"/>
</svg>
