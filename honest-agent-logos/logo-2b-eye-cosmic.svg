<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0014"/>
      <stop offset="100%" style="stop-color:#020010"/>
    </linearGradient>
    <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#EA80FC"/>
      <stop offset="40%" style="stop-color:#7C4DFF"/>
      <stop offset="100%" style="stop-color:#1A0050;stop-opacity:0.7"/>
    </radialGradient>
    <radialGradient id="cosmicGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#EA80FC;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#7C4DFF;stop-opacity:0"/>
    </radialGradient>
    <filter id="rayGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Star field -->
  <g fill="white">
    <circle cx="18" cy="15" r="0.8" opacity="0.7"/>
    <circle cx="42" cy="9"  r="0.6" opacity="0.5"/>
    <circle cx="87" cy="12" r="0.9" opacity="0.6"/>
    <circle cx="112" cy="20" r="0.7" opacity="0.5"/>
    <circle cx="9" cy="52"  r="0.7" opacity="0.4"/>
    <circle cx="119" cy="45" r="0.6" opacity="0.5"/>
    <circle cx="11" cy="80"  r="0.8" opacity="0.6"/>
    <circle cx="118" cy="75" r="0.7" opacity="0.45"/>
    <circle cx="22" cy="110" r="0.6" opacity="0.4"/>
    <circle cx="100" cy="115" r="0.8" opacity="0.5"/>
    <circle cx="58" cy="7"   r="0.5" opacity="0.4"/>
    <circle cx="70" cy="120" r="0.6" opacity="0.4"/>
  </g>

  <!-- Cosmic glow halo -->
  <ellipse cx="64" cy="64" rx="52" ry="52" fill="url(#cosmicGlow)"/>

  <!-- Radial rays (24 rays, every 15°) -->
  <g stroke="#B388FF" stroke-linecap="round" filter="url(#rayGlow)">
    <line x1="64" y1="64" x2="64" y2="8"   stroke-width="1.2" stroke-opacity="0.55"/>
    <line x1="64" y1="64" x2="92" y2="10"  stroke-width="0.9" stroke-opacity="0.35"/>
    <line x1="64" y1="64" x2="113" y2="28" stroke-width="1.2" stroke-opacity="0.55"/>
    <line x1="64" y1="64" x2="120" y2="55" stroke-width="0.9" stroke-opacity="0.35"/>
    <line x1="64" y1="64" x2="120" y2="73" stroke-width="1.2" stroke-opacity="0.55"/>
    <line x1="64" y1="64" x2="113" y2="100" stroke-width="0.9" stroke-opacity="0.35"/>
    <line x1="64" y1="64" x2="92" y2="118"  stroke-width="1.2" stroke-opacity="0.55"/>
    <line x1="64" y1="64" x2="64" y2="120"  stroke-width="0.9" stroke-opacity="0.35"/>
    <line x1="64" y1="64" x2="36" y2="118"  stroke-width="1.2" stroke-opacity="0.55"/>
    <line x1="64" y1="64" x2="15" y2="100"  stroke-width="0.9" stroke-opacity="0.35"/>
    <line x1="64" y1="64" x2="8"  y2="73"   stroke-width="1.2" stroke-opacity="0.55"/>
    <line x1="64" y1="64" x2="8"  y2="55"   stroke-width="0.9" stroke-opacity="0.35"/>
    <line x1="64" y1="64" x2="15" y2="28"   stroke-width="1.2" stroke-opacity="0.55"/>
    <line x1="64" y1="64" x2="36" y2="10"   stroke-width="0.9" stroke-opacity="0.35"/>
  </g>

  <!-- Eye almond (clips the rays visually) -->
  <path d="M16 64 Q64 18 112 64 Q64 110 16 64 Z"
        fill="#0A0014"/>
  <!-- Eye outline glow -->
  <path d="M16 64 Q64 18 112 64 Q64 110 16 64 Z"
        fill="none" stroke="#CE93D8" stroke-width="2" filter="url(#rayGlow)"/>

  <!-- Iris -->
  <circle cx="64" cy="64" r="24" fill="url(#irisGrad)" filter="url(#rayGlow)"/>
  <circle cx="64" cy="64" r="24" fill="none" stroke="#EA80FC" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Pupil -->
  <circle cx="64" cy="64" r="11" fill="#0A0014"/>
  <circle cx="64" cy="64" r="5"  fill="#EA80FC" opacity="0.9" filter="url(#rayGlow)"/>

  <!-- Shine -->
  <circle cx="69" cy="58" r="4" fill="white" opacity="0.5"/>
</svg>
