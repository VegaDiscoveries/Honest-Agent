<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4527A0"/>
      <stop offset="100%" style="stop-color:#880E4F"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#CE93D8;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#7C4DFF;stop-opacity:0.12"/>
    </linearGradient>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Ambient shimmer dots -->
  <circle cx="20" cy="20" r="2" fill="white" opacity="0.25"/>
  <circle cx="108" cy="17" r="1.5" fill="white" opacity="0.2"/>
  <circle cx="14" cy="106" r="1.5" fill="white" opacity="0.2"/>
  <circle cx="113" cy="109" r="2" fill="white" opacity="0.25"/>
  <circle cx="29" cy="62" r="1" fill="#FFD740" opacity="0.3"/>
  <circle cx="100" cy="66" r="1" fill="#FFD740" opacity="0.3"/>

  <!-- Shield – heraldic pointed bottom -->
  <path d="M64 14 L98 27 L98 63 Q98 93 64 112 Q30 93 30 63 L30 27 Z"
        fill="url(#shieldFill)" stroke="#CE93D8" stroke-width="2.5" stroke-opacity="0.9"/>
  <!-- Inner dash line accent -->
  <path d="M64 22 L92 33 L92 63 Q92 88 64 104 Q36 88 36 63 L36 33 Z"
        fill="none" stroke="#CE93D8" stroke-width="1" stroke-opacity="0.28" stroke-dasharray="4 3"/>

  <!-- Gold checkmark with depth shadow -->
  <polyline points="43,64 57,78 85,50"
            fill="none" stroke="#FF8F00" stroke-width="8.5"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.35" transform="translate(1.5,2.5)"/>
  <polyline points="43,64 57,78 85,50"
            fill="none" stroke="#FFD740" stroke-width="8"
            stroke-linecap="round" stroke-linejoin="round" filter="url(#goldGlow)"/>

  <!-- 4-point star sparkle – top left -->
  <path d="M53 20 L54.5 16.5 L56 20 L59.5 21.5 L56 23 L54.5 26.5 L53 23 L49.5 21.5 Z"
        fill="#FFD740" opacity="0.85"/>
  <!-- 4-point star sparkle – top right (smaller) -->
  <path d="M76 18 L77 15.5 L78 18 L80.5 19 L78 20 L77 22.5 L76 20 L73.5 19 Z"
        fill="#FFD740" opacity="0.6"/>
</svg>
