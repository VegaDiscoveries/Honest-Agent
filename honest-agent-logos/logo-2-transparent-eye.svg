<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b1b2f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0097a7;stop-opacity:0.4"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg2)"/>

  <!-- Circuit lines -->
  <line x1="18" y1="40" x2="38" y2="40" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="38" y1="40" x2="38" y2="28" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="18" cy="40" r="2.5" fill="#00e5ff" opacity="0.5"/>
  <circle cx="38" cy="28" r="2.5" fill="#00e5ff" opacity="0.5"/>

  <line x1="110" y1="40" x2="90" y2="40" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="90" y1="40" x2="90" y2="28" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="110" cy="40" r="2.5" fill="#00e5ff" opacity="0.5"/>
  <circle cx="90" cy="28" r="2.5" fill="#00e5ff" opacity="0.5"/>

  <line x1="18" y1="88" x2="38" y2="88" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="38" y1="88" x2="38" y2="100" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="18" cy="88" r="2.5" fill="#00e5ff" opacity="0.5"/>
  <circle cx="38" cy="100" r="2.5" fill="#00e5ff" opacity="0.5"/>

  <line x1="110" y1="88" x2="90" y2="88" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="90" y1="88" x2="90" y2="100" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="110" cy="88" r="2.5" fill="#00e5ff" opacity="0.5"/>
  <circle cx="90" cy="100" r="2.5" fill="#00e5ff" opacity="0.5"/>

  <!-- Horizontal circuit through middle -->
  <line x1="20" y1="64" x2="38" y2="64" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="90" y1="64" x2="108" y2="64" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Eye outline (almond shape) -->
  <path d="M22 64 Q64 22 106 64 Q64 106 22 64 Z"
        fill="none" stroke="#00e5ff" stroke-width="2" stroke-opacity="0.7"/>

  <!-- Iris -->
  <circle cx="64" cy="64" r="22" fill="url(#eyeGlow)"/>
  <circle cx="64" cy="64" r="22" fill="none" stroke="#00e5ff" stroke-width="1.5"/>

  <!-- Pupil -->
  <circle cx="64" cy="64" r="11" fill="#0d1b2a"/>
  <circle cx="64" cy="64" r="11" fill="none" stroke="#00e5ff" stroke-width="1"/>

  <!-- Pupil shine -->
  <circle cx="68" cy="60" r="3.5" fill="white" opacity="0.6"/>

  <!-- Inner pupil dot -->
  <circle cx="64" cy="64" r="4" fill="#00e5ff" opacity="0.9"/>
</svg>
