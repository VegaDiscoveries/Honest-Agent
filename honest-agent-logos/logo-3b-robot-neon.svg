<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060612"/>
      <stop offset="100%" style="stop-color:#0A0A1A"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softNeon">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Scanlines -->
  <line x1="0" y1="20" x2="128" y2="20" stroke="#00FFFF" stroke-width="0.5" stroke-opacity="0.05"/>
  <line x1="0" y1="36" x2="128" y2="36" stroke="#00FFFF" stroke-width="0.5" stroke-opacity="0.05"/>
  <line x1="0" y1="52" x2="128" y2="52" stroke="#00FFFF" stroke-width="0.5" stroke-opacity="0.05"/>
  <line x1="0" y1="68" x2="128" y2="68" stroke="#00FFFF" stroke-width="0.5" stroke-opacity="0.05"/>
  <line x1="0" y1="84" x2="128" y2="84" stroke="#00FFFF" stroke-width="0.5" stroke-opacity="0.05"/>
  <line x1="0" y1="100" x2="128" y2="100" stroke="#00FFFF" stroke-width="0.5" stroke-opacity="0.05"/>

  <!-- Data stream (binary column left) -->
  <text x="10" y="40" font-family="monospace" font-size="7" fill="#00FFFF" opacity="0.18">01</text>
  <text x="10" y="52" font-family="monospace" font-size="7" fill="#00FFFF" opacity="0.12">10</text>
  <text x="10" y="64" font-family="monospace" font-size="7" fill="#00FFFF" opacity="0.18">11</text>
  <text x="10" y="76" font-family="monospace" font-size="7" fill="#00FFFF" opacity="0.12">00</text>
  <!-- Right column -->
  <text x="108" y="40" font-family="monospace" font-size="7" fill="#00FFFF" opacity="0.12">10</text>
  <text x="108" y="52" font-family="monospace" font-size="7" fill="#00FFFF" opacity="0.18">01</text>
  <text x="108" y="64" font-family="monospace" font-size="7" fill="#00FFFF" opacity="0.12">11</text>
  <text x="108" y="76" font-family="monospace" font-size="7" fill="#00FFFF" opacity="0.18">00</text>

  <!-- Robot head (geometric hexagonal) -->
  <polygon points="64,14 94,30 94,62 64,78 34,62 34,30"
           fill="none" stroke="#00FFFF" stroke-width="2.5" filter="url(#neonGlow)"/>
  <!-- Inner hex fill -->
  <polygon points="64,14 94,30 94,62 64,78 34,62 34,30"
           fill="#00FFFF" fill-opacity="0.04"/>

  <!-- Left eye - glowing rect -->
  <rect x="42" y="36" width="18" height="12" rx="3" fill="#00FFFF" fill-opacity="0.1" stroke="#00FFFF" stroke-width="1.5" filter="url(#softNeon)"/>
  <!-- Eye ray left -->
  <line x1="42" y1="42" x2="34" y2="42" stroke="#00FFFF" stroke-width="1.5" stroke-opacity="0.7" filter="url(#softNeon)"/>

  <!-- Right eye - glowing rect -->
  <rect x="68" y="36" width="18" height="12" rx="3" fill="#00FFFF" fill-opacity="0.1" stroke="#00FFFF" stroke-width="1.5" filter="url(#softNeon)"/>
  <!-- Eye ray right -->
  <line x1="86" y1="42" x2="94" y2="42" stroke="#00FFFF" stroke-width="1.5" stroke-opacity="0.7" filter="url(#softNeon)"/>

  <!-- Mouth (speaker grill lines) -->
  <line x1="48" y1="58" x2="80" y2="58" stroke="#00FFFF" stroke-width="1.5" filter="url(#softNeon)"/>
  <line x1="52" y1="63" x2="76" y2="63" stroke="#00FFFF" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Chin indicator dot -->
  <circle cx="64" cy="73" r="2.5" fill="#00FFFF" filter="url(#neonGlow)"/>

  <!-- Antenna top -->
  <line x1="64" y1="14" x2="64" y2="6" stroke="#00FFFF" stroke-width="2" stroke-linecap="round" filter="url(#softNeon)"/>
  <circle cx="64" cy="5" r="3" fill="#00FFFF" filter="url(#neonGlow)"/>

  <!-- Body block -->
  <rect x="44" y="82" width="40" height="26" rx="4" fill="none" stroke="#00FFFF" stroke-width="2" filter="url(#softNeon)"/>
  <!-- Chest grid detail -->
  <line x1="64" y1="82" x2="64" y2="108" stroke="#00FFFF" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="44" y1="95" x2="84" y2="95" stroke="#00FFFF" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Power circle -->
  <circle cx="64" cy="88.5" r="3" fill="none" stroke="#00FFFF" stroke-width="1.5" filter="url(#softNeon)"/>
  <line x1="64" y1="85.5" x2="64" y2="83" stroke="#00FFFF" stroke-width="1.5" stroke-linecap="round"/>
</svg>
