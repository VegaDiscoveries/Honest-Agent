<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="50%" style="stop-color:#203a43"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
    <linearGradient id="gemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#80deea"/>
      <stop offset="40%" style="stop-color:#26c6da"/>
      <stop offset="100%" style="stop-color:#00838f"/>
    </linearGradient>
    <linearGradient id="gemTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#80deea"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg4)"/>

  <!-- Glow halo behind gem -->
  <ellipse cx="64" cy="66" rx="36" ry="36" fill="#26c6da" opacity="0.12"/>

  <!-- Diamond / Crystal gem -->
  <!-- Top facets -->
  <polygon points="64,18  44,52  84,52" fill="url(#gemTop)" filter="url(#glow4)"/>
  <!-- Left facet -->
  <polygon points="44,52  28,68  64,110" fill="#4dd0e1" opacity="0.85"/>
  <!-- Right facet -->
  <polygon points="84,52  100,68  64,110" fill="#00acc1" opacity="0.85"/>
  <!-- Center facet -->
  <polygon points="44,52  84,52  100,68  28,68" fill="url(#gemGrad)"/>
  <!-- Bottom triangle left -->
  <polygon points="28,68  64,110  46,68" fill="#00838f" opacity="0.7"/>
  <!-- Bottom triangle right -->
  <polygon points="100,68  64,110  82,68" fill="#006064" opacity="0.7"/>

  <!-- Gem outline -->
  <polygon points="64,18  44,52  28,68  64,110  100,68  84,52"
           fill="none" stroke="#e0f7fa" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow4)"/>

  <!-- Shine streak -->
  <line x1="56" y1="26" x2="48" y2="46" stroke="white" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="64" y1="22" x2="60" y2="34" stroke="white" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
</svg>
