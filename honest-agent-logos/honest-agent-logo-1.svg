<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a2d45"/>
    </linearGradient>
    <linearGradient id="eyeBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48cae4"/>
      <stop offset="100%" stop-color="#0096c7"/>
    </linearGradient>
    <radialGradient id="iris" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#023e8a"/>
      <stop offset="100%" stop-color="#03045e"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Subtle grid lines (circuit-board feel) -->
  <line x1="0" y1="32" x2="128" y2="32" stroke="#48cae4" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="96" x2="128" y2="96" stroke="#48cae4" stroke-width="0.4" opacity="0.08"/>
  <line x1="32" y1="0" x2="32" y2="128" stroke="#48cae4" stroke-width="0.4" opacity="0.08"/>
  <line x1="96" y1="0" x2="96" y2="128" stroke="#48cae4" stroke-width="0.4" opacity="0.08"/>

  <!-- Corner bracket decorations -->
  <path d="M12,26 L12,14 L24,14" fill="none" stroke="#48cae4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M116,26 L116,14 L104,14" fill="none" stroke="#48cae4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M12,102 L12,114 L24,114" fill="none" stroke="#48cae4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M116,102 L116,114 L104,114" fill="none" stroke="#48cae4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Eye outer shape (lens / almond) with glow -->
  <ellipse cx="64" cy="60" rx="44" ry="26" fill="url(#eyeBody)" filter="url(#glow)" opacity="0.95"/>

  <!-- Eye upper eyelid shadow -->
  <path d="M20,60 Q64,26 108,60" fill="#0d1b2a" opacity="0.18"/>

  <!-- Iris ring -->
  <circle cx="64" cy="60" r="21" fill="url(#iris)"/>
  <circle cx="64" cy="60" r="21" fill="none" stroke="#48cae4" stroke-width="1.8" opacity="0.6"/>

  <!-- Pupil -->
  <circle cx="64" cy="60" r="13" fill="#010b13"/>

  <!-- Checkmark inside pupil -->
  <polyline points="56,60 62,67 73,51" fill="none" stroke="#48cae4" stroke-width="3.2"
    stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Specular highlight on iris -->
  <ellipse cx="72" cy="52" rx="5" ry="3" fill="white" opacity="0.2" transform="rotate(-25,72,52)"/>
  <circle cx="55" cy="53" r="1.8" fill="white" opacity="0.25"/>

  <!-- Agent activity dots at bottom -->
  <circle cx="50" cy="100" r="4.5" fill="#48cae4" opacity="0.35"/>
  <circle cx="64" cy="100" r="4.5" fill="#48cae4" opacity="0.9"/>
  <circle cx="78" cy="100" r="4.5" fill="#48cae4" opacity="0.35"/>
</svg>
