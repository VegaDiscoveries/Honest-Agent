<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Synthesis 1: Shield containing an Eye — Trust + Transparency -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00352F"/>
      <stop offset="100%" style="stop-color:#00251A"/>
    </linearGradient>
    <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#64FFDA"/>
      <stop offset="55%" style="stop-color:#00BFA5"/>
      <stop offset="100%" style="stop-color:#00695C;stop-opacity:0.5"/>
    </radialGradient>
    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Shield shape -->
  <path d="M64 12 L100 26 L100 60 Q100 92 64 114 Q28 92 28 60 L28 26 Z"
        fill="#00BFA5" fill-opacity="0.1" stroke="#64FFDA" stroke-width="2.5" stroke-opacity="0.85"
        filter="url(#eyeGlow)"/>

  <!-- Eye inside shield — almond shape centered ~y=62 -->
  <path d="M38 62 Q64 36 90 62 Q64 88 38 62 Z"
        fill="#001A16" stroke="#64FFDA" stroke-width="1.8" filter="url(#eyeGlow)"/>

  <!-- Iris -->
  <circle cx="64" cy="62" r="16" fill="url(#irisGrad)" filter="url(#eyeGlow)"/>
  <circle cx="64" cy="62" r="16" fill="none" stroke="#64FFDA" stroke-width="1.2" stroke-opacity="0.6"/>

  <!-- Pupil -->
  <circle cx="64" cy="62" r="7" fill="#001A16"/>

  <!-- Checkmark pupil -->
  <polyline points="58,62 62,66 70,57"
            fill="none" stroke="#64FFDA" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" filter="url(#eyeGlow)"/>

  <!-- Shine -->
  <circle cx="69" cy="56" r="3.5" fill="white" opacity="0.45"/>

  <!-- Shield corner dots (rivets) -->
  <circle cx="64" cy="18" r="3" fill="#64FFDA" opacity="0.6"/>
  <circle cx="38" cy="30" r="2" fill="#64FFDA" opacity="0.4"/>
  <circle cx="90" cy="30" r="2" fill="#64FFDA" opacity="0.4"/>
</svg>
