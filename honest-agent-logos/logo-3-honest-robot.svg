<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#11998e"/>
    </linearGradient>
    <linearGradient id="robotBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#bdbdbd"/>
    </linearGradient>
    <linearGradient id="halo" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd600"/>
      <stop offset="100%" style="stop-color:#ffab00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg3)"/>

  <!-- Halo -->
  <ellipse cx="64" cy="19" rx="22" ry="6"
           fill="none" stroke="url(#halo)" stroke-width="4"/>

  <!-- Antenna -->
  <line x1="64" y1="26" x2="64" y2="35" stroke="#bdbdbd" stroke-width="3" stroke-linecap="round"/>
  <circle cx="64" cy="23" r="4" fill="#ffd600" stroke="#ffab00" stroke-width="1.5"/>

  <!-- Robot head -->
  <rect x="34" y="35" width="60" height="50" rx="10" fill="url(#robotBody)" stroke="#9e9e9e" stroke-width="1.5"/>

  <!-- Left eye -->
  <rect x="43" y="48" width="16" height="12" rx="4" fill="#1565c0"/>
  <rect x="47" y="51" width="8" height="6" rx="2" fill="#42a5f5"/>
  <circle cx="51" cy="54" r="2" fill="white" opacity="0.8"/>

  <!-- Right eye -->
  <rect x="69" y="48" width="16" height="12" rx="4" fill="#1565c0"/>
  <rect x="73" y="51" width="8" height="6" rx="2" fill="#42a5f5"/>
  <circle cx="77" cy="54" r="2" fill="white" opacity="0.8"/>

  <!-- Smile (honest, friendly) -->
  <path d="M48 70 Q64 82 80 70"
        fill="none" stroke="#616161" stroke-width="3" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="41" cy="72" rx="5" ry="3" fill="#ef9a9a" opacity="0.6"/>
  <ellipse cx="87" cy="72" rx="5" ry="3" fill="#ef9a9a" opacity="0.6"/>

  <!-- Robot body (small) -->
  <rect x="47" y="86" width="34" height="20" rx="6" fill="url(#robotBody)" stroke="#9e9e9e" stroke-width="1.5"/>

  <!-- Chest light -->
  <circle cx="64" cy="96" r="5" fill="#ffd600" opacity="0.9"/>
  <circle cx="64" cy="96" r="3" fill="#ffab00"/>
</svg>
