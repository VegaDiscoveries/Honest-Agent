<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6f00"/>
      <stop offset="100%" style="stop-color:#c62828"/>
    </linearGradient>
    <linearGradient id="letterH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="letterA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4"/>
      <stop offset="100%" style="stop-color:#ffd54f"/>
    </linearGradient>
    <filter id="shadow6">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg6)"/>

  <!-- Subtle top highlight -->
  <ellipse cx="64" cy="0" rx="80" ry="40" fill="white" opacity="0.07"/>

  <!-- H letter -->
  <!-- Left vertical bar of H -->
  <rect x="18" y="28" width="14" height="72" rx="5" fill="url(#letterH)" filter="url(#shadow6)"/>
  <!-- Right vertical bar of H -->
  <rect x="54" y="28" width="14" height="72" rx="5" fill="url(#letterH)" filter="url(#shadow6)"/>
  <!-- Crossbar of H -->
  <rect x="18" y="57" width="50" height="14" rx="5" fill="url(#letterH)" filter="url(#shadow6)"/>

  <!-- A letter -->
  <!-- Left diagonal of A -->
  <polygon points="72,100  86,28  93,28  93,28  100,28  114,100  100,100  94,78  86,78  80,100"
           fill="url(#letterA)" filter="url(#shadow6)"/>
  <!-- Crossbar fill override for A -->
  <!-- Left leg -->
  <polygon points="72,100  83,100  93,60  86,60" fill="url(#letterA)" filter="url(#shadow6)"/>
  <!-- Right leg -->
  <polygon points="114,100  103,100  93,60  100,60" fill="url(#letterA)" filter="url(#shadow6)"/>
  <!-- Top of A -->
  <polygon points="86,28  100,28  104,46  82,46" fill="url(#letterA)" filter="url(#shadow6)"/>
  <!-- A crossbar -->
  <rect x="83" y="62" width="20" height="11" rx="3" fill="url(#letterA)" filter="url(#shadow6)"/>

  <!-- Small truth dot / period accent -->
  <circle cx="64" cy="112" r="5" fill="white" opacity="0.4"/>
</svg>
